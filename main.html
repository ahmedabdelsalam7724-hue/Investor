
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصتك</title>
<link rel="stylesheet" href="css/style.css">
<style>
body {
    font-family: "Cairo", sans-serif;
    background-color: #faf8f3;
    margin: 0;
    padding: 0;
}

header {
    background-color: #b08d57;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

header h1 {
    margin: 0;
    font-size: 20px;
}

#menuBtn {
    font-size: 26px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* القائمة الجانبية */
.side-menu {
    display: none; /* مخفية افتراضياً */
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 230px;
    background-color: #fff;
    box-shadow: -2px 0 8px rgba(0,0,0,0.2);
    padding-top: 60px;
    z-index: 999;
}

.side-menu a {
    display: block;
    padding: 15px 20px;
    color: #333;
    text-decoration: none;
    border-bottom: 1px solid #eee;
    font-weight: 600;
}

.side-menu a:hover {
    background-color: #f0e8dc;
    color: #000;
}

/* محتوى الصفحة */
.main-content {
    padding: 20px;
    text-align: center;
}

button {
    background-color: #b08d57;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #9b784d;
}
</style>
</head>
<body>

<header>
    <h1>منصتك</h1>
    <button id="menuBtn" onclick="toggleMenu()">=</button>
</header>

<!-- القائمة الجانبية -->
<div class="side-menu" id="sideMenu">
    <a href="investmentCircles.html">دوائر الإستثمار</a>
    <a href="negotiationTable.html">طاولة المفاوضات</a>
    <a href="chatRooms.html">غرف الدردشة</a>
    <a href="wallet.html">المحفظة الإلكترونية</a>
    <a href="cards.html">البطاقات</a>
    <a href="arena.html">ساحة العرض</a>
</div>

<!-- المحتوى الرئيسي -->
<div class="main-content">
    <h2>مرحباً بك فى منصتك</h2>
    <p>اختر من القائمة ما تريد زيارته</p>
</div>

<script>
function toggleMenu(){
    const menu = document.getElementById("sideMenu");
    if(menu.style.display === "block"){
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>

</body>
</html>
