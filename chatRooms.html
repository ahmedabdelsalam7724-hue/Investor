
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرف الدردشة</title>
<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background-color: #f5f2ea;
  color: #333;
}

.header {
  background-color: #3b3229;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

.container {
  display: flex;
  flex-direction: row;
  height: 100vh;
}

.sidebar {
  width: 30%;
  background-color: #fff;
  border-left: 2px solid #b08d57;
  padding: 15px;
  overflow-y: auto;
}

.chat-area {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  background-color: #fff6e0;
}

.room {
  background-color: #f0e8d9;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.room:hover {
  background-color: #e0d4c0;
}

.room.active {
  background-color: #b08d57;
  color: white;
}

.chat-messages {
  flex-grow: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  background-color: white;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
  max-width: 70%;
}

.message.user {
  background-color: #b08d57;
  color: white;
  align-self: flex-end;
}

.send-box {
  display: flex;
  padding: 10px;
  background-color: #fff;
  border-top: 1px solid #ccc;
}

input {
  flex-grow: 1;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-family: "Cairo", sans-serif;
}

button {
  background-color: #3b3229;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  margin-right: 8px;
  cursor: pointer;
}
button:hover {
  background-color: #5a4d3d;
}
</style>
</head>
<body>

<div class="header">غرف الدردشة</div>

<div class="container">
  <div class="sidebar" id="roomList">
    <!-- قائمة الغرف -->
  </div>

  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <p style="text-align:center;color:#777;">اختر غرفة لبدء الدردشة 💬</p>
    </div>
    <div class="send-box">
      <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا...">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>
</div>

<script>
// الغرف التجريبية
const rooms = [
  { name: "غرفة المستثمرين", messages: [
    { user: "Ali", text: "أهلاً بكم في غرفة المستثمرين." },
    { user: "Sara", text: "هل هناك فرص جديدة هذا الأسبوع؟" }
  ]},
  { name: "غرفة المبدعين", messages: [
    { user: "Mona", text: "مرحباً! لدي فكرة مشروع جديدة." },
    { user: "Omar", text: "شاركيها معنا 😊" }
  ]},
  { name: "غرفة الشركات", messages: [
    { user: "شركة النور", text: "نبحث عن شركاء جدد في التصنيع." },
    { user: "شركة أمل", text: "أرسلوا التفاصيل عبر البريد." }
  ]}
];

let currentRoom = null;
const roomList = document.getElementById("roomList");
const chatMessages = document.getElementById("chatMessages");
const msgInput = document.getElementById("msgInput");

// عرض الغرف
rooms.forEach((room, index) => {
  const div = document.createElement("div");
  div.classList.add("room");
  div.innerText = room.name;
  div.onclick = () => openRoom(index);
  roomList.appendChild(div);
});

function openRoom(index){
  document.querySelectorAll(".room").forEach(r => r.classList.remove("active"));
  document.querySelectorAll(".room")[index].classList.add("active");

  currentRoom = rooms[index];
  renderMessages();
}

function renderMessages(){
  chatMessages.innerHTML = "";
  currentRoom.messages.forEach(msg => {
    const div = document.createElement("div");
    div.classList.add("message");
    if(msg.user === "أنا") div.classList.add("user");
    div.innerText = `${msg.user}: ${msg.text}`;
    chatMessages.appendChild(div);
  });
}

function sendMessage(){
  const text = msgInput.value.trim();
  if(!text){
    alert("من فضلك اكتب رسالة أولاً.");
    return;
  }
  if(!currentRoom){
    alert("اختر غرفة دردشة أولاً.");
    return;
  }
  currentRoom.messages.push({ user: "أنا", text });
  renderMessages();
  msgInput.value = "";
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
</script>

</body>
</html>
