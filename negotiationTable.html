<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>طاولة المفاوضات</title>
<style>
body{font-family:Cairo, sans-serif;padding:12px;background:#faf8f3}
.item{background:#fff;padding:10px;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>
<h3>طاولة المفاوضات</h3>
<div id="tables"></div>
<script>
let tabs=JSON.parse(localStorage.getItem('negotiations')||'[]');
if(tabs.length===0){tabs=[{id:'N1',name:'مفاوضة مع شركة أ',date:new Date().toISOString()}];localStorage.setItem('negotiations',JSON.stringify(tabs))}
function render(){
  const t=document.getElementById('tables');t.innerHTML='';
  tabs.forEach(n=>{
    const el=document.createElement('div');el.className='item';
    el.innerHTML=`<div><strong>${n.name}</strong></div>
    <div><button onclick="openNeg('${n.id}')">افتح</button></div>`;
    t.appendChild(el)
  });
}
function openNeg(id){alert('عرض مفاوضة (محاكاة)')}
render();
</script>
</body>
</html>
