
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب جديد</title>
<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background-color: #f5f2ea;
  color: #333;
}

.header {
  background-color: #3b3229;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 22px;
}

.container {
  max-width: 500px;
  margin: 30px auto;
  background-color: #fff;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: "Cairo", sans-serif;
}

button {
  background-color: #b08d57;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #3b3229;
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.terms {
  font-size: 14px;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<div class="header">إنشاء حساب جديد</div>

<div class="container">
  <label>الاسم الكامل</label>
  <input type="text" id="fullName" placeholder="أدخل اسمك الكامل">

  <label>الدولة</label>
  <select id="country">
    <option value="">اختر الدولة</option>
    <option value="AL">🇦🇱 ألبانيا</option>
    <option value="AR">🇦🇷 الأرجنتين</option>
    <option value="BR">🇧🇷 البرازيل</option>
    <option value="CI">🇨🇮 كوت ديفوار</option>
    <option value="HR">🇭🇷 كرواتيا</option>
    <option value="DE">🇩🇪 ألمانيا</option>
    <option value="EG">🇪🇬 مصر</option>
    <option value="IN">🇮🇳 الهند</option>
    <option value="US">🇺🇸 أمريكا</option>
    <option value="GB">🏴 بريطانيا</option>
    <option value="MA">🇲🇦 المغرب</option>
    <option value="MX">🇲🇽 المكسيك</option>
    <option value="MQ">🇲🇶 مارتينيك</option>
    <option value="KW">🇰🇼 الكويت</option>
    <option value="LY">🇱🇾 ليبيا</option>
    <option value="JP">🇯🇵 اليابان</option>
    <option value="IQ">🇮🇶 العراق</option>
    <option value="CA">🇨🇦 كندا</option>
    <option value="BH">🇧🇭 البحرين</option>
  </select>

  <label>الرقم القومي</label>
  <input type="text" id="nationalID" placeholder="أدخل الرقم القومي">

  <label>نوع الحساب</label>
  <select id="accountType" onchange="showExtraFields()">
    <option value="">اختر نوع الحساب</option>
    <option value="personal">حساب شخصي</option>
    <option value="company">حساب شركة</option>
    <option value="investor">حساب مستثمر</option>
  </select>

  <div id="extraFields"></div>

  <div class="terms">
    <input type="checkbox" id="acceptTerms">
    أوافق على <a href="terms.html" target="_blank">الشروط والبنود</a>
  </div>

  <button onclick="createAccount()">إنشاء الحساب</button>
</div>

<script>
function showExtraFields(){
  const type = document.getElementById("accountType").value;
  const container = document.getElementById("extraFields");
  container.innerHTML = "";

  if(type === "company"){
    container.innerHTML = `
      <label>اسم الشركة</label>
      <input type="text" id="companyName" placeholder="أدخل اسم الشركة">
      <label>نطاق عمل الشركة</label>
      <input type="text" id="companyScope" placeholder="أدخل نطاق عمل الشركة">
      <label>أرباح الشركة</label>
      <input type="text" id="companyProfit" placeholder="أدخل أرباح الشركة">
      <label>المستندات المطلوبة</label>
      <input type="file" id="companyDocs">
      <label>وسيلة دفع</label>
      <select id="companyPayment">
        <option value="">اختر وسيلة الدفع</option>
        <option value="paypal">PayPal</option>
        <option value="vodafone">Vodafone Cash</option>
        <option value="orange">Orange Cash</option>
        <option value="visa">Visa Bank</option>
        <option value="instapay">InstaPay</option>
      </select>
    `;
  } else if(type === "investor"){
    container.innerHTML = `
      <label>وسيلة دفع</label>
      <select id="investorPayment">
        <option value="">اختر وسيلة الدفع</option>
        <option value="paypal">PayPal</option>
        <option value="vodafone">Vodafone Cash</option>
        <option value="orange">Orange Cash</option>
        <option value="visa">Visa Bank</option>
        <option value="instapay">InstaPay</option>
      </select>
    `;
  }
}

function createAccount(){
  const fullName = document.getElementById("fullName").value.trim();
  const country = document.getElementById("country").value;
  const nationalID = document.getElementById("nationalID").value.trim();
  const accountType = document.getElementById("accountType").value;
  const termsChecked = document.getElementById("acceptTerms").checked;

  if(!fullName || !country || !nationalID || !accountType || !termsChecked){
    alert("يرجى ملء جميع الحقول والموافقة على الشروط.");
    return;
  }

  // يمكن إضافة الحقول الإضافية هنا حسب نوع الحساب
  alert("تم إنشاء الحساب بنجاح ✅");

  // الانتقال إلى الصفحة الرئيسية (main.html)
  window.location.href = "main.html";
}
</script>

</body>
</html>
