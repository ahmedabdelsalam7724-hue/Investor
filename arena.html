<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ساحة العرض - Finance</title>
<style>
  :root{--brown:#b08d57;--brown-light:#d6b89a}
  body{font-family:Cairo, sans-serif;margin:0;background:#faf8f3}
  header{background:var(--brown);color:#fff;padding:10px;display:flex;align-items:center;justify-content:space-between}
  header .left{display:flex;align-items:center;gap:8px}
  .menuBtn{font-size:22px;background:none;border:none;color:#fff;cursor:pointer}
  .brand{font-weight:700}
  .toolbar{display:flex;gap:10px;padding:8px;background:#fff;align-items:center;justify-content:space-between}
  .toolbar .actions{display:flex;gap:10px;align-items:center}
  .avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #fff}
  .container{padding:12px}
  .post{background:#fff;padding:12px;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
  .post .meta{display:flex;gap:10px;align-items:center}
  .post .meta img{width:44px;height:44px;border-radius:50%;object-fit:cover}
  .post .meta .info{flex:1;text-align:right}
  .post .actions{display:flex;gap:8px;margin-top:8px}
  .btn{padding:8px 12px;border-radius:8px;border:1px solid #eee;cursor:pointer;background:#fff}
  .brown-msg{background:var(--brown-light);padding:10px;border-radius:8px;color:#2b1f12;margin:8px 0}
</style>
</head>
<body>
<header>
  <div class="left">
    <button class="menuBtn" id="menuBtn">🏤</button>
    <div class="brand">Finance</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="userName"></div>
    <img id="topAvatar" class="avatar" src="" alt="avatar">
  </div>
</header>

<div class="toolbar" id="toolbar">
  <div class="actions">
    <button id="profileBtn" class="btn">◯</button>
    <button id="reelsBtn" class="btn">ريلز</button>
    <button id="notifBtn" class="btn">🔔</button>
    <button id="refreshBtn" class="btn">🌐</button>
  </div>
  <div>ابحث 🔎 <input id="searchInput" placeholder="ابحث عن منشورات أو حسابات"></div>
</div>

<div class="container">
  <div id="messageArea" class="brown-msg" style="display:none"></div>
  <div id="posts"></div>
</div>

<script>
const currentUser=JSON.parse(localStorage.getItem('currentUser')||'null');
if(!currentUser){location.href='index.html'}
document.getElementById('userName').innerText=currentUser.name||'';
if(currentUser.avatar) document.getElementById('topAvatar').src=currentUser.avatar; else document.getElementById('topAvatar').src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect width="100%" height="100%" fill="%23ccc"/></svg>';

function showBrown(text){const d=document.getElementById('messageArea');d.innerText=text;d.style.display='block';setTimeout(()=>d.style.display='none',2500)}

let posts=JSON.parse(localStorage.getItem('posts')||'[]');
if(posts.length===0){ posts=[{id:'p1',userId:currentUser.id,userName:currentUser.name,avatar:currentUser.avatar||'',text:'أول منشور تجريبي',time:Date.now(),reactions:{},comments:[]}]; localStorage.setItem('posts',JSON.stringify(posts)); }

function renderPosts(){
  const container=document.getElementById('posts');container.innerHTML='';
  posts.sort((a,b)=>b.time-a.time);
  posts.forEach(p=>{
    const el=document.createElement('div');el.className='post';
    el.innerHTML=`
      <div class="meta">
        <img src="${p.avatar||'https://via.placeholder.com/44'}"/>
        <div class="info">
          <div><strong>${p.userName}</strong></div>
          <div style="font-size:12px;color:#666">${new Date(p.time).toLocaleString()}</div>
        </div>
      </div>
      <div class="content">${p.text}</div>
      <div class="actions">
        <button class="btn reactBtn">شعور (${Object.keys(p.reactions||{}).length})</button>
        <button class="btn commentBtn">تعليقات (${(p.comments||[]).length})</button>
        <button class="btn shareBtn">مشاركة</button>
      </div>`;
    container.appendChild(el);
  });
}

renderPosts();

document.getElementById('refreshBtn').addEventListener('click',()=>{posts=JSON.parse(localStorage.getItem('posts')||'[]');renderPosts();showBrown('تم تحديث المنشورات')});
document.getElementById('profileBtn').addEventListener('click',()=>location.href='profile.html');
document.getElementById('reelsBtn').addEventListener('click',()=>{alert('ستعرض الريلز هنا - ترتيب: الأقدم للأحدث ثم بالأكثر تفاعل')});
document.getElementById('notifBtn').addEventListener('click',()=>location.href='notifications.html');
</script>
</body>
</html>
