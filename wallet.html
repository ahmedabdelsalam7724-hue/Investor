<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المحفظة</title>
<style>
body{font-family:Cairo, sans-serif;background:#faf8f3;padding:12px}
.card{background:#fff;padding:12px;border-radius:10px;max-width:600px;margin:auto}
.actions{display:flex;gap:8px}
</style>
</head>
<body>
<div class="card">
  <h3>محفظتك</h3>
  <div>رقم المحفظة: <span id="wId"></span></div>
  <div>الرصيد: <strong id="balance">0</strong></div>
  <div class="actions" style="margin-top:10px">
    <button onclick="showWithdraw()">سحب</button>
    <button onclick="showTransfer()">تحويل</button>
    <button onclick="showDeposit()">إيداع</button>
  </div>
  <div id="formArea" style="margin-top:12px"></div>
</div>
<script>
const user=JSON.parse(localStorage.getItem('currentUser'))||{};
let wallets=JSON.parse(localStorage.getItem('wallets')||'{}');
if(!wallets[user.id]) wallets[user.id]={id:'W'+user.id,balance:0,transactions:[]};
localStorage.setItem('wallets',JSON.stringify(wallets));
const w=wallets[user.id];
document.getElementById('wId').innerText=w.id;
document.getElementById('balance').innerText=w.balance;
function showWithdraw(){document.getElementById('formArea').innerHTML=`<div>السحب (محاكاة)</div><input id="amount" placeholder="المبلغ"><button onclick="withdraw()">التالي</button>`}
function withdraw(){const amt=Number(document.getElementById('amount').value)||0;alert('سيصدر كود ATM لسحب '+amt)}
function showTransfer(){document.getElementById('formArea').innerHTML=`<div>تحويل لحساب آخر</div><input id="toId" placeholder="رقم حساب المستلم"><input id="tAmt" placeholder="المبلغ"><button onclick="transfer()">تحويل</button>`}
function transfer(){alert('تم التحويل (محاكاة)')}
function showDeposit(){document.getElementById('formArea').innerHTML=`<div>إيداع بالبطاقة (محاكاة)</div><input placeholder="المبلغ"><input placeholder="رقم البطاقة"><button>إيداع</button>`}
</script>
</body>
</html>
